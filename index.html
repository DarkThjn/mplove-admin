<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>MPLove Admin</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

#wheel{
margin-top:20px;
display:block;
}

#wheelContainer{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
}

#randomResult{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🎁 MPLove Admin Dashboard</h1>

<div class="stats">

<div class="stat">
Total Gifts
<span id="total"></span>
</div>

<div class="stat">
🔥 High
<span id="high"></span>
</div>

<div class="stat">
⭐ Medium
<span id="medium"></span>
</div>

<div class="stat">
🌿 Low
<span id="low"></span>
</div>

</div>

<div class="controls">

<button id="randomBtn">
🎡 Spin Wheel
</button>

</div>

<div id="wheelContainer">

<canvas id="wheel" width="320" height="320"></canvas>

<div id="randomResult"></div>

</div>

<div id="wishlist"></div>

<script src="admin.js"></script>

</body>

</html>
